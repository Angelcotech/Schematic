<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='3' y='4' width='10' height='8' rx='1.5' fill='%235ec0e5'/%3E%3Crect x='19' y='4' width='10' height='8' rx='1.5' fill='%235ec0e5'/%3E%3Crect x='11' y='20' width='10' height='8' rx='1.5' fill='%235ec0e5'/%3E%3Cline x1='8' y1='12' x2='16' y2='20' stroke='%23888' stroke-width='1.5'/%3E%3Cline x1='24' y1='12' x2='16' y2='20' stroke='%23888' stroke-width='1.5'/%3E%3C/svg%3E" />
    <title>Schematic</title>
    <style>
      /* Blueprint aesthetic — deep navy. The dot grid is painted onto
         the 2D overlay canvas so it pans/zooms with the view (proper
         drafting-surface feel) rather than being a static CSS pattern. */
      html, body {
        margin: 0; padding: 0; height: 100%; overflow: hidden;
        background: #101c2e;
        color: #dce7f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #toolbar {
        position: absolute; top: 0; left: 0; right: 0; height: 36px;
        display: flex; align-items: center; gap: 4px;
        padding: 4px 8px; box-sizing: border-box;
        background: rgba(8, 14, 24, 0.95);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        z-index: 10; user-select: none;
        font-size: 12px;
      }
      #tabbar { display: flex; align-items: center; gap: 4px; flex: 1; min-width: 0; overflow-x: auto; }
      #tabbar::-webkit-scrollbar { display: none; }
      #tools { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }

      #tabbar .tab {
        padding: 4px 4px 4px 10px; border-radius: 4px; cursor: pointer;
        color: rgba(230, 230, 230, 0.7);
        background: rgba(255, 255, 255, 0.04);
        white-space: nowrap;
        display: flex; align-items: center; gap: 6px;
      }
      #tabbar .tab:hover { color: #fff; background: rgba(255, 255, 255, 0.08); }
      #tabbar .tab.active {
        background: rgba(94, 192, 229, 0.20);
        color: #fff;
        border: 1px solid rgba(94, 192, 229, 0.55);
        padding: 3px 3px 3px 9px;
      }
      #tabbar .tab .close {
        width: 14px; height: 14px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 3px;
        color: rgba(230, 230, 230, 0.5);
        font-size: 14px; line-height: 1;
      }
      #tabbar .tab .close:hover { color: #fff; background: rgba(255, 255, 255, 0.12); }
      #closed-panel {
        position: absolute; top: 40px; right: 8px; z-index: 20;
        width: 240px;
        background: rgba(14, 22, 34, 0.98);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        padding: 8px 0;
        font-size: 11px;
        color: rgba(230, 230, 230, 0.85);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }
      #closed-panel .empty { padding: 6px 12px; color: rgba(220, 220, 220, 0.5); font-style: italic; }
      #closed-panel .item {
        padding: 6px 12px; cursor: pointer;
        display: flex; align-items: center; justify-content: space-between; gap: 8px;
      }
      #closed-panel .item:hover { background: rgba(255, 255, 255, 0.06); }
      #closed-panel .item .right {
        display: flex; align-items: center; gap: 6px; flex-shrink: 0;
      }
      #closed-panel .item .reopen { font-size: 10px; color: rgba(220, 220, 220, 0.5); }
      #closed-panel .item:hover .reopen { color: #fff; }
      #closed-panel .item .delete-btn {
        width: 16px; height: 16px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 3px;
        color: rgba(220, 220, 220, 0.4);
        font-size: 14px; line-height: 1;
        cursor: pointer;
      }
      #closed-panel .item .delete-btn:hover {
        color: rgba(242, 90, 90, 1);
        background: rgba(242, 90, 90, 0.15);
      }
      #tabbar .new-canvas, .tool-btn {
        padding: 4px 10px; border-radius: 4px; cursor: pointer;
        color: rgba(230, 230, 230, 0.5);
        background: rgba(255, 255, 255, 0.03);
        white-space: nowrap;
      }
      #tabbar .new-canvas:hover, .tool-btn:hover { color: #fff; background: rgba(255, 255, 255, 0.08); }
      .tool-btn.open { color: #fff; background: rgba(255, 255, 255, 0.12); }

      #cc-activity {
        display: none;  /* revealed when a session is active */
        padding: 4px 10px; border-radius: 4px;
        font-size: 11px; color: rgba(230, 230, 230, 0.7);
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        display: flex; align-items: center; gap: 7px;
        white-space: nowrap;
        cursor: default;
      }
      #cc-activity .dot {
        width: 7px; height: 7px; border-radius: 50%;
        background: rgba(130, 200, 130, 0.9); /* fresh */
        box-shadow: 0 0 6px rgba(130, 200, 130, 0.5);
      }
      #cc-activity.stale .dot {
        background: rgba(220, 180, 90, 0.75);
        box-shadow: none;
      }
      #cc-activity.idle .dot {
        background: rgba(140, 140, 140, 0.6);
        box-shadow: none;
      }

      #legend {
        position: absolute; top: 40px; right: 8px; z-index: 20;
        width: 300px;
        background: rgba(14, 22, 34, 0.98);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 11px;
        color: rgba(230, 230, 230, 0.85);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }
      #legend h4 { margin: 0 0 6px 0; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: rgba(220, 220, 220, 0.55); }
      #legend section + section { margin-top: 12px; }
      #legend .row { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
      #legend .swatch { width: 18px; height: 10px; border-radius: 2px; flex-shrink: 0; }
      #legend .swatch.halo { border-radius: 999px; }
      #legend .swatch.line { height: 3px; }

      /* Two-line rows for edge kinds: label on top, short hint below.
         The hint teaches the vocabulary ("what IS a call edge") without
         forcing users to go hunt for docs. */
      #legend .edge-row { align-items: flex-start; padding: 5px 0; }
      #legend .edge-row .swatch.line { margin-top: 7px; }
      #legend .edge-row-text {
        display: flex; flex-direction: column; gap: 2px; min-width: 0;
      }
      #legend .edge-label {
        font-size: 11px; color: rgba(230, 240, 250, 0.95); font-weight: 500;
      }
      #legend .edge-hint {
        font-size: 10.5px; line-height: 1.35;
        color: rgba(180, 200, 230, 0.65);
      }
      #legend .attribution {
        margin-top: 14px; padding-top: 10px;
        border-top: 1px solid rgba(140, 200, 235, 0.12);
        font-size: 10px; color: rgba(180, 200, 230, 0.55);
        text-align: center;
      }
      #legend .attribution a {
        color: rgba(94, 192, 229, 0.9);
        text-decoration: none;
      }
      #legend .attribution a:hover { color: rgba(94, 192, 229, 1); text-decoration: underline; }

      #canvas-container {
        position: absolute; top: 36px; left: 0; right: 0; bottom: 0;
      }
      #canvas { display: block; width: 100%; height: 100%; }

      #empty-state {
        position: absolute; inset: 36px 0 0 0;
        display: flex; align-items: center; justify-content: center;
        pointer-events: none;
      }
      /* Mockup diagram that sits behind the welcome panel. Slight radial
         fade at the center keeps the panel readable — the mockup is more
         visible at the canvas edges, drawing the eye outward after the
         user reads the welcome text. */
      #mockup-bg {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        opacity: 0.32;
        pointer-events: none;
        -webkit-mask-image:
          radial-gradient(ellipse 58% 52% at center, transparent 0%, transparent 28%, rgba(0,0,0,0.55) 55%, rgba(0,0,0,1) 80%);
        mask-image:
          radial-gradient(ellipse 58% 52% at center, transparent 0%, transparent 28%, rgba(0,0,0,0.55) 55%, rgba(0,0,0,1) 80%);
      }
      #mockup-bg .process rect {
        fill: rgba(94, 192, 229, 0.035);
        stroke: rgba(94, 192, 229, 0.28);
        stroke-width: 1;
        stroke-dasharray: 4 4;
      }
      #mockup-bg .process-pill {
        fill: rgba(10, 22, 36, 0.85);
        stroke: rgba(94, 192, 229, 0.45);
        stroke-width: 1;
        stroke-dasharray: 0;
      }
      #mockup-bg .process-label {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        fill: rgba(200, 230, 250, 0.85);
        text-anchor: middle;
        letter-spacing: 0.05em;
      }
      #mockup-bg .node rect {
        fill: rgba(14, 28, 46, 0.9);
        stroke: rgba(94, 192, 229, 0.6);
        stroke-width: 1.2;
      }
      #mockup-bg .node text {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        fill: rgba(220, 235, 250, 0.92);
        text-anchor: middle;
      }
      #mockup-bg path {
        fill: none;
        stroke-width: 1.5;
      }
      #mockup-bg .e-calls    { stroke: rgb(94, 192, 229); }
      #mockup-bg .e-imports  { stroke: rgb(150, 180, 210); }
      #mockup-bg .e-reads    { stroke: rgb(130, 200, 140); }
      #mockup-bg .e-writes   { stroke: rgb(230, 170, 100); }
      #mockup-bg .e-control  { stroke: rgb(190, 150, 220); stroke-dasharray: 4 3; }
      #mockup-bg .edge-label {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        fill: rgba(200, 220, 240, 0.85);
        text-anchor: middle;
      }
      #empty-state .panel {
        pointer-events: auto;
        position: relative;
        z-index: 1;
        max-width: 420px;
        background: rgba(18, 30, 46, 0.92);
        border: 1px solid rgba(140, 200, 235, 0.22);
        border-radius: 10px;
        padding: 28px 32px;
        color: rgba(230, 240, 250, 0.95);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(2px);
      }
      #empty-state h1 {
        font-size: 22px; font-weight: 500; margin: 0 0 4px 0;
        color: rgba(94, 192, 229, 0.95);
        letter-spacing: 0.02em;
      }
      #empty-state .tagline {
        font-size: 12px; margin: 0 0 18px 0;
        color: rgba(200, 215, 230, 0.65);
      }
      #empty-state .step {
        display: flex; gap: 10px; margin: 10px 0;
        font-size: 13px; line-height: 1.5;
      }
      #empty-state .step-num {
        flex-shrink: 0;
        width: 20px; height: 20px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(94, 192, 229, 0.18);
        border: 1px solid rgba(94, 192, 229, 0.45);
        border-radius: 50%;
        font-size: 10px; color: rgba(94, 192, 229, 1);
        margin-top: 1px;
      }
      #empty-state .step-body { flex: 1; color: rgba(230, 240, 250, 0.90); }
      #empty-state .step-body .note {
        margin-top: 4px;
        font-size: 11px;
        color: rgba(180, 200, 230, 0.55);
        font-style: italic;
      }
      #empty-state code {
        background: rgba(94, 192, 229, 0.10);
        border: 1px solid rgba(94, 192, 229, 0.20);
        color: rgba(190, 225, 245, 0.98);
        padding: 1px 6px; border-radius: 4px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        /* Inline (not inline-block) keeps the code chip on the same
           baseline as surrounding text — no vertical offset against
           labels like "Say:". white-space: nowrap still prevents wrap
           mid-phrase. */
        white-space: nowrap;
      }
      #empty-state .what-is {
        font-size: 12px;
        line-height: 1.55;
        color: rgba(210, 225, 240, 0.78);
        margin: 0 0 18px 0;
        padding: 12px 14px;
        background: rgba(94, 192, 229, 0.05);
        border-left: 2px solid rgba(94, 192, 229, 0.35);
        border-radius: 0 4px 4px 0;
      }
      #empty-state .authoring {
        display: flex; align-items: center; gap: 10px;
        margin-top: 14px; padding-top: 14px;
        border-top: 1px solid rgba(140, 200, 235, 0.12);
        font-size: 12px; color: rgba(200, 215, 230, 0.75);
      }
      #empty-state .welcome-action {
        display: block;
        margin-top: 18px;
        padding: 10px 16px;
        width: 100%;
        background: rgba(94, 192, 229, 0.18);
        border: 1px solid rgba(94, 192, 229, 0.5);
        border-radius: 6px;
        color: rgba(230, 240, 250, 0.95);
        font: inherit;
        font-size: 13px;
        cursor: pointer;
      }
      #empty-state .welcome-action:hover {
        background: rgba(94, 192, 229, 0.28);
      }
      #empty-state .authoring .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: rgba(94, 192, 229, 0.95);
        box-shadow: 0 0 8px rgba(94, 192, 229, 0.6);
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.5; transform: scale(0.95); }
        50%      { opacity: 1;   transform: scale(1.08); }
      }

      #brand-footer {
        position: absolute; bottom: 6px; right: 10px;
        z-index: 5;
        font-size: 10px;
        color: rgba(140, 180, 220, 0.35);
        pointer-events: auto;
      }
      #brand-footer a {
        color: rgba(94, 192, 229, 0.55);
        text-decoration: none;
      }
      #brand-footer a:hover { color: rgba(94, 192, 229, 0.95); }

      #create-modal {
        position: absolute; inset: 0; z-index: 30;
        background: rgba(0, 0, 0, 0.55);
        display: flex; align-items: center; justify-content: center;
      }
      #create-modal .panel {
        width: 440px; max-width: 90vw;
        background: #0a141f;
        border: 1px solid rgba(140, 200, 235, 0.18);
        border-radius: 8px;
        padding: 20px 22px;
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.6);
      }
      #create-modal h3 { margin: 0 0 14px 0; font-size: 14px; font-weight: 500; }
      #create-modal label { display: block; font-size: 11px; color: rgba(220, 220, 220, 0.6); margin-bottom: 14px; }
      #create-modal input,
      #create-modal textarea {
        display: block; width: 100%; margin-top: 4px; box-sizing: border-box;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 4px; padding: 7px 9px;
        color: #eee; font: inherit; font-size: 12px;
        outline: none;
        resize: vertical;
      }
      #create-modal input:focus, #create-modal textarea:focus {
        border-color: rgba(212, 169, 58, 0.6);
      }
      #create-modal .buttons {
        display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px;
      }
      #create-modal button {
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        color: #eee; font: inherit; font-size: 12px;
        padding: 6px 14px; border-radius: 4px; cursor: pointer;
      }
      #create-modal button:hover { background: rgba(255, 255, 255, 0.1); }
      #create-modal button.primary {
        background: rgba(94, 192, 229, 0.25);
        border-color: rgba(94, 192, 229, 0.65);
      }
      #create-modal button.primary:hover { background: rgba(94, 192, 229, 0.35); }
      #create-modal button.primary:disabled { opacity: 0.5; cursor: default; }

      /* The one-and-only prompt modal. Every context-menu action that
         produces a CC prompt opens this — user reviews, clicks Copy, and
         pastes into Claude Code. */
      #prompt-modal {
        position: absolute; inset: 0; z-index: 30;
        background: rgba(0, 0, 0, 0.55);
        display: flex; align-items: center; justify-content: center;
      }
      #prompt-modal .panel {
        width: 560px; max-width: 92vw;
        background: #0a141f;
        border: 1px solid rgba(140, 200, 235, 0.18);
        border-radius: 8px;
        padding: 20px 22px;
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.6);
      }
      #prompt-modal h3 { margin: 0 0 8px 0; font-size: 14px; font-weight: 500; }
      #prompt-modal .hint { font-size: 11px; color: rgba(200, 215, 230, 0.6); margin: 0 0 12px 0; }
      #prompt-modal textarea {
        display: block; width: 100%; min-height: 220px; box-sizing: border-box;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(94, 192, 229, 0.30);
        border-radius: 4px; padding: 10px 12px;
        color: #dce7f0;
        font: inherit; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px;
        line-height: 1.5;
        resize: vertical;
        outline: none;
      }
      #prompt-modal textarea:focus { border-color: rgba(94, 192, 229, 0.65); }
      #prompt-modal .buttons { margin-top: 10px; display: flex; justify-content: flex-end; gap: 8px; }
      #prompt-modal button {
        font: inherit; font-size: 12px;
        padding: 6px 14px; border-radius: 4px; cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        color: #eee;
      }
      #prompt-modal button:hover { background: rgba(255, 255, 255, 0.1); }
      #prompt-modal button.primary {
        border-color: rgba(94, 192, 229, 0.55);
        background: rgba(94, 192, 229, 0.20);
      }
      #prompt-modal button.primary:hover { background: rgba(94, 192, 229, 0.35); }

      #toast {
        position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
        z-index: 40;
        background: rgba(14, 22, 34, 0.98);
        border: 1px solid rgba(94, 192, 229, 0.6);
        color: #eee; font-size: 12px;
        padding: 9px 14px; border-radius: 6px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
      }

      #ctx-menu {
        position: absolute; z-index: 30;
        min-width: 220px;
        background: rgba(14, 22, 34, 0.98);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        padding: 4px 0;
        font-size: 12px;
        color: rgba(230, 230, 230, 0.9);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        user-select: none;
      }
      #ctx-menu .header {
        padding: 4px 12px 6px 12px;
        font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em;
        color: rgba(220, 220, 220, 0.45);
      }
      #ctx-menu .item {
        padding: 6px 12px; cursor: pointer;
        display: flex; justify-content: space-between; align-items: center; gap: 8px;
      }
      #ctx-menu .item:hover { background: rgba(255, 255, 255, 0.06); color: #fff; }
      #ctx-menu .item .hint {
        font-size: 10px; color: rgba(220, 220, 220, 0.4);
      }
      #ctx-menu .item:hover .hint { color: rgba(255, 255, 255, 0.7); }
      #ctx-menu .sep {
        height: 1px; background: rgba(255, 255, 255, 0.08);
        margin: 4px 0;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <div id="tabbar"></div>
      <div id="tools">
        <div id="cc-activity" title=""><span class="dot"></span><span id="cc-activity-text"></span></div>
        <div class="tool-btn" id="closed-btn" title="Recently closed canvases" style="display:none">Closed</div>
        <div class="tool-btn" id="legend-btn" title="Show color legend">Legend</div>
      </div>
    </div>
    <div id="canvas-container"><canvas id="canvas"></canvas></div>
    <div id="empty-state" style="display:none">
      <!-- Atmospheric mockup diagram. Shown only on onboarding modes
           (no-workspace, no-canvases) to tease what Schematic produces.
           Hidden in authoring mode so it doesn't sit behind real live
           nodes when CC starts populating the canvas. -->
      <svg id="mockup-bg" viewBox="0 0 1400 780" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
        <defs>
          <!-- One arrowhead per edge color. Marker path is a triangle
               pointing right along +x; orient="auto" rotates per-edge. -->
          <marker id="mk-calls" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
            <path d="M0,0 L10,5 L0,10 z" fill="rgb(94, 192, 229)"/>
          </marker>
          <marker id="mk-imports" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
            <path d="M0,0 L10,5 L0,10 z" fill="rgb(150, 180, 210)"/>
          </marker>
          <marker id="mk-reads" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
            <path d="M0,0 L10,5 L0,10 z" fill="rgb(130, 200, 140)"/>
          </marker>
          <marker id="mk-writes" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
            <path d="M0,0 L10,5 L0,10 z" fill="rgb(230, 170, 100)"/>
          </marker>
          <marker id="mk-control" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
            <path d="M0,0 L10,5 L0,10 z" fill="rgb(190, 150, 220)"/>
          </marker>
        </defs>

        <!-- Process pills (rounded outlines with pilled title). -->
        <g class="process">
          <rect x="50" y="80" width="400" height="280" rx="10"/>
          <rect class="process-pill" x="60" y="64" width="130" height="22" rx="11"/>
          <text class="process-label" x="125" y="79">Frontend</text>
        </g>
        <g class="process">
          <rect x="560" y="120" width="420" height="420" rx="10"/>
          <rect class="process-pill" x="570" y="104" width="120" height="22" rx="11"/>
          <text class="process-label" x="630" y="119">Daemon</text>
        </g>
        <g class="process">
          <rect x="1080" y="80" width="280" height="320" rx="10"/>
          <rect class="process-pill" x="1090" y="64" width="90" height="22" rx="11"/>
          <text class="process-label" x="1135" y="79">MCP</text>
        </g>

        <!-- Edges. Orthogonal polylines with small rounded corners,
             matching the real renderer's routing style. Drawn BEFORE
             nodes so nodes paint on top. -->
