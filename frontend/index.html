<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='3' y='4' width='10' height='8' rx='1.5' fill='%23d4a93a'/%3E%3Crect x='19' y='4' width='10' height='8' rx='1.5' fill='%23d4a93a'/%3E%3Crect x='11' y='20' width='10' height='8' rx='1.5' fill='%23d4a93a'/%3E%3Cline x1='8' y1='12' x2='16' y2='20' stroke='%23888' stroke-width='1.5'/%3E%3Cline x1='24' y1='12' x2='16' y2='20' stroke='%23888' stroke-width='1.5'/%3E%3C/svg%3E" />
    <title>Schematic</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0a0a0a; color: #ddd; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

      #tabbar {
        position: absolute; top: 0; left: 0; right: 0; height: 36px;
        display: flex; align-items: center; gap: 4px;
        padding: 4px 8px; box-sizing: border-box;
        background: rgba(10, 10, 10, 0.85);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        z-index: 10; user-select: none;
        font-size: 12px;
      }
      #tabbar .tab {
        padding: 4px 10px; border-radius: 4px; cursor: pointer;
        color: rgba(230, 230, 230, 0.7);
        background: rgba(255, 255, 255, 0.04);
      }
      #tabbar .tab:hover { color: #fff; background: rgba(255, 255, 255, 0.08); }
      #tabbar .tab.active {
        background: rgba(212, 169, 58, 0.18);
        color: #fff;
        border: 1px solid rgba(212, 169, 58, 0.4);
        padding: 3px 9px;
      }
      #tabbar .new-canvas {
        padding: 4px 10px; border-radius: 4px; cursor: pointer;
        color: rgba(230, 230, 230, 0.5);
        background: rgba(255, 255, 255, 0.03);
      }
      #tabbar .new-canvas:hover { color: #fff; background: rgba(255, 255, 255, 0.08); }

      #canvas-container {
        position: absolute; top: 36px; left: 0; right: 0; bottom: 0;
      }
      #canvas { display: block; width: 100%; height: 100%; }

      #empty-state {
        position: absolute; inset: 36px 0 0 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: rgba(230, 230, 230, 0.55);
        pointer-events: none;
      }
      #empty-state h2 { font-size: 15px; font-weight: 500; margin: 0 0 10px 0; }
      #empty-state p { font-size: 12px; margin: 4px 0; }
      #empty-state code {
        background: rgba(255, 255, 255, 0.05); padding: 2px 6px; border-radius: 3px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
    </style>
  </head>
  <body>
    <div id="tabbar"></div>
    <div id="canvas-container"><canvas id="canvas"></canvas></div>
    <div id="empty-state" style="display:none">
      <h2>No diagrams yet</h2>
      <p>Ask Claude Code to make one.</p>
      <p>Try: <code>diagram the WebGL pipeline</code></p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
